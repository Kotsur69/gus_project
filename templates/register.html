{% extends "base.html" %}
{% block title %}Rejestracja{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Utwórz konto</h1>
        <p class="subtitle">Dołącz i uzyskaj dostęp do pełnej analizy danych GUS</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Nazwa użytkownika</label>
                <input type="text" id="username" name="username" placeholder="np. jan_kowalski"
                       value="{{ username|default('') }}" required autofocus minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Adres e-mail</label>
                <input type="email" id="email" name="email" placeholder="jan@example.com"
                       value="{{ email|default('') }}" required>
            </div>
            <div class="form-group">
                <label for="password">Hasło</label>
                <input type="password" id="password" name="password" placeholder="Minimum 6 znaków" required minlength="6">
            </div>
            <div class="form-group">
                <label for="password2">Powtórz hasło</label>
                <input type="password" id="password2" name="password2" placeholder="Powtórz hasło" required>
            </div>
            <button type="submit" class="btn btn-primary">Zarejestruj się →</button>
        </form>

        <p class="auth-footer">
            Masz już konto? <a href="{{ url_for('login') }}">Zaloguj się</a>
        </p>
    </div>
</div>
{% endblock %}
